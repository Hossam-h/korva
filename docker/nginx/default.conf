server {
    listen 80;
    index index.php;

    location / {
        try_files $uri $uri/ @php;
    }

    location @php {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/korva/public/index.php;
        include fastcgi_params;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/korva/public$fastcgi_script_name;
        include fastcgi_params;
    }
}