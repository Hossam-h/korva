services:

  app:
    image: hossamdocker12/korva-app:latest
    restart: always
    env_file:
      - .env
    volumes:
      - app_files:/var/www/html/korva    # ← app copies files to volume
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_files:/var/www/html/korva    # ← nginx reads from same volume
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:alpine
    restart: always

  queue:
    image: hossamdocker12/korva-app:latest
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf
    restart: always
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  app_files:
