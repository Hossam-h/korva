services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: hossamdocker12/korva-app:latest
    volumes:
      - .:/var/www/html/korva
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html/korva                                    # ✅ fixed
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: on-failure       # ← add this

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: korva
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_PASSWORD: 12345678
      MYSQL_USER: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/html/korva                                    # ✅ fixed
    depends_on:
      - mysql

volumes:
  mysql_data: